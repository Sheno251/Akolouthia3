<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>أكولوثيا – نظام المتابعة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <!-- شاشة الدخول -->
    <div id="loginScreen" class="screen">
        <h1>📖 أكولوثيا – نظام المتابعة</h1>
        <div class="card">
            <h2>اختر هويتك</h2>
            <button onclick="showMemberList()" class="btn-primary">👤 عضو</button>
            <button onclick="showAdminLogin()" class="btn-secondary">🛡️ أدمن</button>
        </div>
    </div>

    <!-- شاشة الأعضاء -->
    <div id="memberScreen" class="screen hidden">
        <button onclick="backToLogin()" class="btn-back">← رجوع</button>
        <button id="adminPanelBtn" onclick="showAdminDashboard()" style="display:none;" class="btn-secondary">📊 لوحة الأدمن</button>
        <h2 style="margin-top:12px">اختر اسمك</h2>
        <div id="memberList" class="member-grid"></div>
    </div>

    <!-- لوحة العضو -->
    <div id="memberDashboard" class="screen hidden">
        <button onclick="backToMemberList()" class="btn-back">← رجوع</button>
        <button id="backToAdminBtn" onclick="backToAdminPanel()" style="display:none;" class="btn-secondary">📊 لوحة الأدمن</button>
        <h2 id="memberName" style="margin-top:12px"></h2>
        <div class="months-tabs" id="memberMonthsTabs"></div>
        <div class="attendance-buttons" id="attendanceButtons">
            <button class="status-btn present" onclick="recordStatus('present')">✅ حاضر</button>
            <button class="status-btn late" onclick="recordLateAuto()">⏰ متأخر</button>
            <button class="status-btn absent" onclick="recordStatus('absent')">❌ غائب بدون عذر</button>
            <button class="status-btn excused" onclick="recordStatus('excused')">📝 غائب بعذر</button>
            <button class="status-btn travel" onclick="recordStatus('travel')">✈️ مسافر</button>
        </div>
        <div id="currentStatus" class="current-status"></div>
        <div class="stats">
            <h3>📊 نسبتي الشخصية</h3>
            <div id="personalStats"></div>
            <div id="notesSection" style="margin-top:15px;"></div>
        </div>
    </div>

    <!-- شاشة دخول الأدمن -->
    <div id="adminLoginScreen" class="screen hidden">
        <button onclick="backToLogin()" class="btn-back">← رجوع</button>
        <h2 style="margin-top:12px">دخول الأدمن</h2>
        <div class="card">
            <input type="text" id="adminUsername" placeholder="اسم المستخدم">
            <input type="password" id="adminPassword" placeholder="كلمة السر">
            <button onclick="verifyAdmin()" class="btn-primary">دخول</button>
        </div>
    </div>

    <!-- لوحة تحكم الأدمن -->
    <div id="adminDashboard" class="screen hidden">
        <button onclick="backToLogin()" class="btn-back">← خروج</button>
        <h2 style="margin-top:12px">لوحة تحكم الأدمن</h2>
        
        <div class="settings-card">
            <h3>⚙️ إعدادات الموعد الرسمي</h3>
            <div class="time-input">
                <span>الموعد الحالي:</span>
                <strong id="currentOfficialTime">09:00</strong>
                <input type="time" id="newOfficialTime" value="09:00">
                <button onclick="updateOfficialTime()" class="btn-small">تحديث</button>
            </div>
        </div>

        <div class="date-range" id="reportDateRange">📅 جاري تحميل التاريخ...</div>

        <div class="months-tabs" id="adminMonthsTabs"></div>
        
        <div class="filter-buttons">
            <button id="filterMonthly" class="active">📆 شهري</button>
            <button id="filterWeekly">📅 أسبوعي (آخر سبت)</button>
        </div>
        
        <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:12px 0">
            <button id="downloadPDFBtn" style="background:#e53e3e;color:white;padding:8px 16px;border:none;border-radius:40px">📄 تحميل PDF</button>
            <button onclick="window.print()" style="background:#48bb78;color:white;padding:8px 16px;border:none;border-radius:40px">🖨️ طباعة</button>
            <button id="changePasswordBtn" style="background:#f59e0b;color:white;padding:8px 16px;border:none;border-radius:40px">🔑 تغيير كلمة المرور</button>
            <button id="deleteMonthBtn" style="background:#e53e3e;color:white;padding:8px 16px;border:none;border-radius:40px">🗑️ حذف الشهر الحالي</button>
        </div>
        
        <div id="pdf-content">
            <div id="adminStats"></div>
            <div id="cardsContainer" class="cards-grid"></div>
        </div>
        
        <div id="weeklyLatecomers"></div>
        
        <!-- قسم تعديل وحذف التسجيلات (لـ shenouda فقط) -->
        <div id="editableRecordsSection" style="margin-top:30px; display:none;">
            <hr style="margin:20px 0;">
            <h3>✏️ تعديل أو حذف تسجيل فردي</h3>
            <div id="editableRecordsTable" style="overflow-x:auto;"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7spg88GjCuFWFCH2a8BBl_1njhCjdG_W4kZ7dxjamnkDwDI_sHMamL2aDYa6DLUOP8Q/exec';
    console.log("✅ Google Sheets API ready");
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
